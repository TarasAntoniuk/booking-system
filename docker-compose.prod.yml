version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: booking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - booking-network
    command: redis-server --appendonly yes --appendfsync everysec
    restart: unless-stopped

  app:
    build: .
    container_name: booking-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - booking-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  booking-network:
    driver: bridge